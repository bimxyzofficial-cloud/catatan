<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NeonCash · Catatan Transaksi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0e1a;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', Roboto, sans-serif;
      padding: 20px 16px 40px 16px;
      color: #eef2ff;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid #1e2a4e;
      padding-bottom: 14px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      color: #2dd4bf;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(140deg, #7dd3fc, #38bdf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .badge-lokal {
      background: #111827;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 12px;
      color: #9ab3d5;
      border: 0.5px solid #2d3a5e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge-lokal svg {
      width: 14px;
      height: 14px;
    }

    /* ringkasan utama */
    .ringkasan-utama {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .card-pemasukan, .card-pengeluaran {
      background: rgba(12, 20, 32, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 18px 20px;
      transition: all 0.2s;
      border: 1px solid rgba(0, 200, 255, 0.15);
    }
    .card-pemasukan { border-left: 4px solid #2dd4bf; box-shadow: 0 5px 12px rgba(0,0,0,0.2); }
    .card-pengeluaran { border-left: 4px solid #f87171; box-shadow: 0 5px 12px rgba(0,0,0,0.2); }
    .label-besar {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #9bb5d4;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .label-besar svg {
      width: 18px;
      height: 18px;
    }
    .nominal-besar {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }
    .text-pemasukan { color: #2dd4bf; }
    .text-pengeluaran { color: #f87171; }

    /* grid stats */
    .grid-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-item {
      background: #0f1422cc;
      border-radius: 20px;
      padding: 12px 14px;
      border: 1px solid #1f2a46;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat-icon {
      width: 32px;
      height: 32px;
      color: #5f7fbf;
    }
    .stat-content {
      flex: 1;
    }
    .stat-label {
      font-size: 12px;
      color: #7f95c0;
      margin-bottom: 4px;
    }
    .stat-num {
      font-size: 18px;
      font-weight: 700;
    }

    /* filter section */
    .filter-section {
      background: #0c1122aa;
      border-radius: 28px;
      padding: 18px 16px;
      margin-bottom: 20px;
      border: 1px solid #1f2c4a;
    }
    .filter-header {
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-header svg {
      width: 16px;
      height: 16px;
      color: #7e95c2;
    }
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .filter-chip {
      background: #111a2c;
      border: 1px solid #263450;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      color: #b9ceff;
    }
    .filter-chip.active {
      background: #0c2b44;
      border-color: #2dd4bf;
      color: #b6f0ff;
      box-shadow: 0 0 6px #2dd4bf30;
    }

    /* tabel */
    .tabel-wrapper {
      overflow-x: auto;
      border-radius: 24px;
      background: #0a0f1e60;
      padding: 4px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 14px 8px;
      font-size: 12px;
      font-weight: 500;
      color: #7e95c2;
      border-bottom: 1px solid #1f2a48;
    }
    td {
      padding: 14px 8px;
      font-size: 13px;
      border-bottom: 1px solid #1a243e;
      color: #e2e9ff;
    }
    .badge-tipe {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-tipe svg {
      width: 12px;
      height: 12px;
    }
    .badge-income {
      background: #0b3b2e60;
      color: #5ee0cf;
      border-left: 2px solid #2dd4bf;
    }
    .badge-expense {
      background: #631d1d40;
      color: #ff9f9f;
      border-left: 2px solid #f87171;
    }
    .hapus-btn {
      background: none;
      border: none;
      color: #7e6a6a;
      cursor: pointer;
      transition: 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .hapus-btn svg {
      width: 18px;
      height: 18px;
    }
    .hapus-btn:hover { color: #f87171; transform: scale(1.05); }
    .empty-row td {
      text-align: center;
      padding: 36px;
      color: #65749b;
    }

    /* form bawah */
    .form-bawah {
      margin-top: 32px;
      background: #0d1225dd;
      border-radius: 32px;
      padding: 20px;
      border: 1px solid #283453;
      backdrop-filter: blur(4px);
    }
    .form-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b7dcff;
    }
    .form-title svg {
      width: 20px;
      height: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label {
      font-size: 12px;
      font-weight: 500;
      color: #90ade6;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-group label svg {
      width: 14px;
      height: 14px;
    }
    input {
      background: #030617;
      border: 1px solid #2d3b62;
      border-radius: 18px;
      padding: 10px 14px;
      color: #f0f4ff;
      font-size: 13px;
      outline: none;
      transition: 0.1s;
    }
    input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px #2dd4bf20;
    }
    .toggle-type {
      display: flex;
      gap: 12px;
      background: #030617;
      border-radius: 40px;
      padding: 4px;
      border: 1px solid #2b3a62;
    }
    .toggle-item {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      border-radius: 32px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .toggle-item svg {
      width: 14px;
      height: 14px;
    }
    .toggle-income-active {
      background: #0b463a;
      color: #a7f0e3;
      border: 0.5px solid #2dd4bf;
    }
    .toggle-expense-active {
      background: #7a2e2e;
      color: #ffc5c5;
      border: 0.5px solid #f87171;
    }
    .btn-simpan {
      background: linear-gradient(95deg, #113e5c, #0b2f48);
      border: 1px solid #2dd4bf;
      border-radius: 40px;
      padding: 12px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.15s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-simpan svg {
      width: 16px;
      height: 16px;
    }
    .btn-simpan:hover {
      background: #165a7a;
      transform: scale(0.98);
      box-shadow: 0 0 10px #2dd4bf40;
    }
    @media (min-width: 640px) {
      .grid-stats { grid-template-columns: repeat(4, 1fr); }
      .form-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .note-text {
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #a2b7e0;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="3"/></svg>
      <h1>Catatan Transaksi</h1>
    </div>
  </div>



  <!-- ringkasan kecil -->
  <div class="grid-stats">
    <div class="stat-item"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="stat-content"><div class="stat-label">Hari ini</div><div class="stat-num" id="summaryToday">Rp0</div></div></div>
    <div class="stat-item"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg></div><div class="stat-content"><div class="stat-label">Minggu ini</div><div class="stat-num" id="summaryWeek">Rp0</div></div></div>
    <div class="stat-item"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4-3-9s1.34-9 3-9"/></svg></div><div class="stat-content"><div class="stat-label">Bulan ini</div><div class="stat-num" id="summaryMonth">Rp0</div></div></div>
    <div class="stat-item"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3M12 2v12M9 11l3 3 3-3"/></svg></div><div class="stat-content"><div class="stat-label">Total Semua</div><div class="stat-num" id="summaryTotal">Rp0</div></div></div>
  </div>

  <!-- FILTER + RIWAYAT -->
  <div class="filter-section">
    <div class="filter-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="22 3 2 3 10 13 10 21 14 18 14 13 22 3"/></svg>
      Filter riwayat
    </div>
    <div class="filter-buttons">
      <button class="filter-chip" data-filter="today">Hari ini</button>
      <button class="filter-chip" data-filter="week">Minggu ini</button>
      <button class="filter-chip" data-filter="month">Bulan ini</button>
      <button class="filter-chip active" data-filter="all">Semua</button>
    </div>
  </div>

  <div class="tabel-wrapper">
    <table>
      <thead>
        <tr><th>Tanggal</th><th>Produk</th><th>Nominal</th><th>Tipe</th><th>Catatan</th><th style="width:40px"></th></tr>
      </thead>
      <tbody id="transactionTableBody"></tbody>
    </table>
  </div>

  <!-- FORM INPUT di paling bawah -->
  <div class="form-bawah">
    <div class="form-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
      Tambah transaksi baru
    </div>
    <form id="transactionForm">
      <div class="form-grid">
        <div class="input-group">
          <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Tanggal</label>
          <input type="date" id="date" required>
        </div>
        <div class="input-group">
          <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7h-4.18A3 3 0 0 0 16 5.18V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v1.18A3 3 0 0 0 8.18 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/><path d="M8 11h8"/><path d="M8 15h4"/></svg>Nama produk</label>
          <input type="text" id="productName" placeholder="Deskripsi singkat" required>
        </div>
        <div class="input-group">
          <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12H4M12 4v16"/></svg>Tipe</label>
          <div class="toggle-type" id="typeToggleWrapper">
            <div class="toggle-item toggle-income-active" data-type="income">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
              Pemasukan
            </div>
            <div class="toggle-item" data-type="expense">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14"/></svg>
              Pengeluaran
            </div>
          </div>
          <input type="hidden" id="transactionType" value="income">
        </div>
        <div class="input-group">
          <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Nominal (Rp)</label>
          <input type="number" id="amount" placeholder="0" required>
        </div>
        <div class="input-group">
          <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>Catatan (opsional)</label>
          <input type="text" id="note" placeholder="belanja, dll">
        </div>
        <div class="input-group" style="justify-content: flex-end;">
          <button type="submit" class="btn-simpan">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-4H7v4"/><path d="M9 7h6"/></svg>
            Simpan transaksi
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  let transactions = [];

  function loadFromLocal() {
    const stored = localStorage.getItem("neoncash_db");
    if(stored) transactions = JSON.parse(stored);
    else transactions = [];
  }

  function saveToLocal() { localStorage.setItem("neoncash_db", JSON.stringify(transactions)); }

  function getTodayStr() { return new Date().toISOString().slice(0,10); }

  function isSameDay(dateStr, ref) { return dateStr === ref; }
  function isCurrentWeek(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - today.getDay());
    start.setHours(0,0,0,0);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    return d >= start && d <= end;
  }
  function isCurrentMonth(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }

  function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(angka);
  }

  function updateAllSummaries() {
    let totalIncome = 0, totalExpense = 0, todayBalance = 0, weekBalance = 0, monthBalance = 0, overallBalance = 0;
    const todayStr = getTodayStr();
    transactions.forEach(t => {
      const val = t.amount;
      if(t.type === "income") {
        totalIncome += val; overallBalance += val;
        if(isSameDay(t.date, todayStr)) todayBalance += val;
        if(isCurrentWeek(t.date)) weekBalance += val;
        if(isCurrentMonth(t.date)) monthBalance += val;
      } else {
        totalExpense += val; overallBalance -= val;
        if(isSameDay(t.date, todayStr)) todayBalance -= val;
        if(isCurrentWeek(t.date)) weekBalance -= val;
        if(isCurrentMonth(t.date)) monthBalance -= val;
      }
    });
    document.getElementById("totalPemasukan").innerText = formatRupiah(totalIncome);
    document.getElementById("totalPengeluaran").innerText = formatRupiah(totalExpense);
    document.getElementById("summaryToday").innerText = formatRupiah(todayBalance);
    document.getElementById("summaryWeek").innerText = formatRupiah(weekBalance);
    document.getElementById("summaryMonth").innerText = formatRupiah(monthBalance);
    document.getElementById("summaryTotal").innerText = formatRupiah(overallBalance);
  }

  let currentFilter = "all";

  function renderHistory() {
    let filtered = [];
    const todayStr = getTodayStr();
    if(currentFilter === "today") filtered = transactions.filter(t => isSameDay(t.date, todayStr));
    else if(currentFilter === "week") filtered = transactions.filter(t => isCurrentWeek(t.date));
    else if(currentFilter === "month") filtered = transactions.filter(t => isCurrentMonth(t.date));
    else filtered = [...transactions];
    filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
    const tbody = document.getElementById("transactionTableBody");
    if(filtered.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Belum ada transaksi untuk periode ini</td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(tx => `
      <tr>
        <td>${tx.date}</td>
        <td style="font-weight:500;">${escapeHtml(tx.product)}</td>
        <td class="${tx.type === "income" ? "text-pemasukan" : "text-pengeluaran"}">${tx.type === "income" ? "+" : "-"} ${formatRupiah(tx.amount)}</td>
        <td><span class="badge-tipe ${tx.type === "income" ? "badge-income" : "badge-expense"}">${tx.type === "income" ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14"/></svg>'} ${tx.type === "income" ? "Pemasukan" : "Pengeluaran"}</span></td>
        <td class="note-text" title="${escapeHtml(tx.note || '')}">${escapeHtml(tx.note) || '—'}</td>
        <td><button class="hapus-btn" data-id="${tx.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button></td>
      </tr>
    `).join("");
    document.querySelectorAll(".hapus-btn").forEach(btn => {
      btn.addEventListener("click", (e) => deleteTransactionById(btn.getAttribute("data-id")));
    });
  }

  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[m])); }
  function deleteTransactionById(id) { transactions = transactions.filter(t => t.id !== id); saveToLocal(); updateAllSummaries(); renderHistory(); }

  function addNewTransaction(event) {
    event.preventDefault();
    const date = document.getElementById("date").value;
    const product = document.getElementById("productName").value.trim();
    const amountRaw = document.getElementById("amount").value;
    const note = document.getElementById("note").value.trim();
    const type = document.getElementById("transactionType").value;
    if(!product) { alert("Nama produk harus diisi"); return; }
    if(!amountRaw || parseFloat(amountRaw) <= 0) { alert("Nominal harus lebih dari 0"); return; }
    const newTx = { id: Date.now() + "-" + Math.random().toString(36).substr(2,6), date, product, amount: parseFloat(amountRaw), note: note || "", type };
    transactions.unshift(newTx);
    saveToLocal();
    updateAllSummaries();
    renderHistory();
    document.getElementById("productName").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";
    document.getElementById("date").value = getTodayStr();
    setActiveToggle("income");
    document.getElementById("productName").focus();
  }

  function setActiveToggle(type) {
    const incomeDiv = document.querySelector(".toggle-item[data-type='income']");
    const expenseDiv = document.querySelector(".toggle-item[data-type='expense']");
    if(type === "income") {
      incomeDiv.classList.add("toggle-income-active"); expenseDiv.classList.remove("toggle-expense-active");
    } else {
      expenseDiv.classList.add("toggle-expense-active"); incomeDiv.classList.remove("toggle-income-active");
    }
    document.getElementById("transactionType").value = type;
  }

  function setFilterAndRender(filterKey) {
    currentFilter = filterKey;
    document.querySelectorAll(".filter-chip").forEach(chip => {
      if(chip.getAttribute("data-filter") === filterKey) chip.classList.add("active");
      else chip.classList.remove("active");
    });
    renderHistory();
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadFromLocal();
    document.getElementById("date").value = getTodayStr();
    setActiveToggle("income");
    updateAllSummaries();
    renderHistory();
    document.getElementById("transactionForm").addEventListener("submit", addNewTransaction);
    document.querySelector(".toggle-item[data-type='income']").addEventListener("click", () => setActiveToggle("income"));
    document.querySelector(".toggle-item[data-type='expense']").addEventListener("click", () => setActiveToggle("expense"));
    document.querySelectorAll(".filter-chip").forEach(btn => btn.addEventListener("click", (e) => setFilterAndRender(btn.getAttribute("data-filter"))));
  });
</script>
</body>
</html>
